<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chirp 🐦</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
      signOut, onAuthStateChanged, updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, addDoc, getDocs, query, orderBy,
      onSnapshot, serverTimestamp, doc, updateDoc, arrayUnion,
      arrayRemove, getDoc, setDoc, where, limit, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ─────────────────────────────────────────────────────────────
    //  🔥 PASTE YOUR FIREBASE CONFIG HERE
    // ─────────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyDmm0DsJNr0MShXORcDw5zmENfTwOq0n34",
      authDomain: "chirp-2-3797f.firebaseapp.com",
      projectId: "chirp-2-3797f",
      storageBucket: "chirp-2-3797f.firebasestorage.app",
      messagingSenderId: "6464723709",
      appId: "1:6464723709:web:bc0cb524e53f0b2e427c94"
    };

    // ─────────────────────────────────────────────────────────────
    //  👑 ADMIN UID
    //  1. Create your admin account through the normal sign-up flow
    //  2. Go to Firebase Console → Authentication → Users
    //  3. Copy that user's UID and paste it below
    // ─────────────────────────────────────────────────────────────
    const ADMIN_UID = "bnvoAlW0jkcyI5GwYTmF0BgdSCa2";

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    let unsubFeed   = null;
    let isAdmin     = false;

    const $    = id => document.getElementById(id);
    const show = id => $(id).classList.remove('hidden');
    const hide = id => $(id).classList.add('hidden');

    // ── Auth state listener ──
    onAuthStateChanged(auth, async user => {
      if (user) {
        currentUser = user;
        isAdmin     = user.uid === ADMIN_UID;
        const snap  = await getDoc(doc(db, 'users', user.uid));
        if (snap.exists()) {
          const d = snap.data();
          currentUser.chirpHandle = d.handle;
          currentUser.chirpName   = d.displayName;
          currentUser.bio         = d.bio || '';
          currentUser.avatar      = d.avatar || avatarColor(user.uid);
        }
        const accepted = localStorage.getItem('chirp_coc_' + user.uid);
        accepted ? renderApp() : renderCoC();
      } else {
        currentUser = null; isAdmin = false;
        renderAuth();
      }
    });

    function avatarColor(uid) {
      const c = ['#f5a623','#7b61ff','#ff6b6b','#4ecdc4','#45b7d1','#f9ca24','#6ab04c'];
      return c[uid.charCodeAt(0) % c.length];
    }

    // ════════════════════════════════════════════════════════════
    //  CODE OF CONDUCT  (shown once per account, then never again)
    // ════════════════════════════════════════════════════════════
    function renderCoC() {
      $('app').innerHTML = `
        <div class="coc-screen">
          <div class="coc-card">
            <div class="coc-header">
              <span class="coc-bird">🐦</span>
              <h1>Chirp Code of Conduct</h1>
              <p>Read and agree to our community rules before you start chirping.</p>
            </div>
            <div class="coc-body">
              ${cocRules()}
            </div>
            <div class="coc-footer">
              <label class="coc-checkbox">
                <input type="checkbox" id="cocCheck" />
                <span>I have read and agree to the Chirp Code of Conduct</span>
              </label>
              <button class="btn btn-primary" id="cocAcceptBtn" disabled>Enter Chirp ✦</button>
            </div>
          </div>
        </div>`;

      $('cocCheck').onchange = () => { $('cocAcceptBtn').disabled = !$('cocCheck').checked; };
      $('cocAcceptBtn').onclick = () => {
        localStorage.setItem('chirp_coc_' + currentUser.uid, '1');
        renderApp();
      };
    }

    function cocRules() {
      const rules = [
        ['🤝', 'Be Respectful', 'Treat every member with dignity and respect. Harassment, bullying, personal attacks, and hate speech of any kind are strictly prohibited. Disagreements are okay — cruelty is not.'],
        ['🚫', 'No Hate Speech or Discrimination', 'Content that promotes hatred or violence based on race, ethnicity, religion, gender, sexual orientation, disability, nationality, or any other characteristic is not permitted.'],
        ['🔒', 'Protect Privacy', 'Do not share personal information about others without their consent — addresses, phone numbers, private messages, or any identifying details (doxxing).'],
        ['✅', 'Share Truthfully', 'Do not deliberately spread misinformation, impersonate others, or create fake accounts. Be honest about who you are and what you share.'],
        ['🛡️', 'No Illegal Content', 'Do not post anything that violates applicable laws, including content that promotes illegal activities, infringes copyright, or constitutes threats of violence.'],
        ['🔔', 'No Spam', 'Repetitive posts, unsolicited promotions, or bot-like behavior disrupt the community. Keep your chirps genuine and meaningful.'],
        ['⚖️', 'Admin Enforcement', 'Administrators have authority to remove any content or account that violates this Code of Conduct. Their decisions are final. Repeat violations may result in a permanent ban.'],
        ['💬', 'Report, Don\'t Retaliate', 'If you see a rule violation, report it rather than responding in kind. Escalating conflicts only harms the community you\'re part of.'],
      ];
      return rules.map(([icon, title, body], i) => `
        <div class="coc-rule">
          <div class="coc-rule-icon">${icon}</div>
          <div>
            <h3>${i+1}. ${title}</h3>
            <p>${body}</p>
          </div>
        </div>`).join('');
    }

    // ════════════════════════════════════════════════════════════
    //  AUTH UI
    // ════════════════════════════════════════════════════════════
    function renderAuth() {
      $('app').innerHTML = `
        <div class="auth-screen">
          <div class="auth-brand">
            <span class="logo-bird">🐦</span>
            <h1 class="brand-title">Chirp</h1>
            <p class="brand-sub">What's happening in your world?</p>
          </div>
          <div class="auth-card" id="loginCard">
            <h2>Sign in</h2>
            <input id="loginEmail" type="email"    placeholder="Email"               class="input" />
            <input id="loginPass"  type="password" placeholder="Password"            class="input" />
            <button class="btn btn-primary" id="loginBtn">Sign In</button>
            <p class="auth-switch">No account? <a href="#" id="toRegister">Join Chirp</a></p>
            <p class="auth-error hidden" id="loginErr"></p>
          </div>
          <div class="auth-card hidden" id="registerCard">
            <h2>Join Chirp</h2>
            <input id="regName"   type="text"      placeholder="Your name"           class="input" />
            <input id="regHandle" type="text"      placeholder="@handle (no spaces)" class="input" />
            <input id="regEmail"  type="email"     placeholder="Email"               class="input" />
            <input id="regPass"   type="password"  placeholder="Password (6+ chars)" class="input" />
            <button class="btn btn-primary" id="registerBtn">Create Account</button>
            <p class="auth-switch">Have an account? <a href="#" id="toLogin">Sign in</a></p>
            <p class="auth-error hidden" id="regErr"></p>
          </div>
        </div>`;

      $('toRegister').onclick = e => { e.preventDefault(); hide('loginCard'); show('registerCard'); };
      $('toLogin').onclick    = e => { e.preventDefault(); hide('registerCard'); show('loginCard'); };

      $('loginBtn').onclick = async () => {
        const email = $('loginEmail').value.trim(), pass = $('loginPass').value;
        try { $('loginBtn').textContent = 'Signing in…'; await signInWithEmailAndPassword(auth, email, pass); }
        catch(e) { showErr('loginErr', fErr(e.code)); $('loginBtn').textContent = 'Sign In'; }
      };

      $('registerBtn').onclick = async () => {
        const name   = $('regName').value.trim();
        const handle = $('regHandle').value.trim().replace(/\s/g,'').replace('@','');
        const email  = $('regEmail').value.trim();
        const pass   = $('regPass').value;
        if (!name || !handle) return showErr('regErr', 'Name and handle are required.');
        if (handle.length < 2) return showErr('regErr', 'Handle must be at least 2 chars.');
        try {
          $('registerBtn').textContent = 'Creating…';
          const cred = await createUserWithEmailAndPassword(auth, email, pass);
          await updateProfile(cred.user, { displayName: name });
          await setDoc(doc(db, 'users', cred.user.uid), {
            displayName: name, handle, email, bio: '',
            avatar: avatarColor(cred.user.uid),
            followers: [], following: [], createdAt: serverTimestamp()
          });
        } catch(e) { showErr('regErr', fErr(e.code)); $('registerBtn').textContent = 'Create Account'; }
      };
    }

    function showErr(id, msg) { const el=$(id); el.textContent=msg; el.classList.remove('hidden'); }
    function fErr(code) {
      return ({
        'auth/email-already-in-use':'That email is already registered.',
        'auth/invalid-email':'Invalid email address.',
        'auth/weak-password':'Password must be at least 6 characters.',
        'auth/user-not-found':'No account with that email.',
        'auth/wrong-password':'Incorrect password.',
        'auth/invalid-credential':'Invalid email or password.'
      })[code] || 'Something went wrong. Try again.';
    }

    // ════════════════════════════════════════════════════════════
    //  MAIN APP SHELL
    // ════════════════════════════════════════════════════════════
    function renderApp() {
      const crown = isAdmin ? '<span class="admin-crown">👑</span>' : '';
      $('app').innerHTML = `
        <div class="layout">
          <aside class="sidebar">
            <div class="sidebar-logo">🐦 <span>Chirp</span></div>
            <nav class="sidebar-nav">
              <a class="nav-item active" data-view="feed" href="#">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Home</span>
              </a>
              <a class="nav-item" data-view="explore" href="#">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span>Explore</span>
              </a>
              <a class="nav-item" data-view="profile" href="#">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Profile</span>
              </a>
              <a class="nav-item" data-view="coc" href="#">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>Rules</span>
              </a>
              ${isAdmin ? `
              <a class="nav-item nav-admin" data-view="admin" href="#">
                <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span>Admin</span>
              </a>` : ''}
            </nav>
            <button class="btn btn-primary chirp-btn" id="openCompose">✦ Chirp</button>
            <div class="sidebar-user" id="sidebarUser">
              <div class="avatar-sm" id="sidebarAvatar"></div>
              <div style="min-width:0;flex:1;overflow:hidden">
                <div class="user-name">${crown}${currentUser.chirpName||currentUser.displayName}</div>
                <div class="user-handle">@${currentUser.chirpHandle||'you'}</div>
              </div>
              <button class="signout-btn" id="signoutBtn" title="Sign out">
                <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              </button>
            </div>
          </aside>

          <main class="main">
            <div class="top-bar"><h2 id="viewTitle">Home</h2></div>
            <div id="statusBanner" class="status-banner hidden"></div>
            <div id="viewContainer"></div>
          </main>

          <div class="right-panel">
            <div class="search-box">
              <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input id="searchInput" type="text" placeholder="Search Chirp" />
            </div>
            <div class="trending-card">
              <h3>Trending</h3>
              <div id="trendingList"><div class="loading-pulse">Loading…</div></div>
            </div>
          </div>
        </div>

        <!-- Compose Modal -->
        <div class="modal-overlay hidden" id="composeModal">
          <div class="modal">
            <button class="modal-close" id="closeCompose">✕</button>
            <div class="compose-area">
              <div class="avatar-md" id="composeAvatar"></div>
              <div class="compose-right">
                <textarea id="chirpText" placeholder="What's chirping?" maxlength="280"></textarea>
                <div class="compose-footer">
                  <span class="char-count" id="charCount">280</span>
                  <button class="btn btn-primary" id="postBtn">Chirp</button>
                </div>
              </div>
            </div>
          </div>
        </div>`;

      setAvatar($('sidebarAvatar'), currentUser);
      setAvatar($('composeAvatar'), currentUser);

      document.querySelectorAll('.nav-item').forEach(a => {
        a.onclick = e => {
          e.preventDefault();
          document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
          a.classList.add('active');
          switchView(a.dataset.view);
        };
      });

      $('openCompose').onclick  = () => { show('composeModal'); $('chirpText').focus(); };
      $('closeCompose').onclick = () => hide('composeModal');
      $('composeModal').onclick = e => { if(e.target.id==='composeModal') hide('composeModal'); };
      $('chirpText').oninput    = () => {
        const left = 280 - $('chirpText').value.length;
        $('charCount').textContent = left;
        $('charCount').style.color = left < 20 ? '#ff6b6b' : 'var(--muted)';
      };
      $('postBtn').onclick   = postChirp;
      $('signoutBtn').onclick = () => signOut(auth);
      $('searchInput').oninput = debounce(handleSearch, 400);

      loadTrending();
      loadStatusBanner();
      switchView('feed');
    }

    function setAvatar(el, user) {
      el.style.background = user.avatar || avatarColor(user.uid);
      el.textContent = (user.chirpName || user.displayName || '?')[0].toUpperCase();
    }

    // ════════════════════════════════════════════════════════════
    //  STATUS BANNER  — admin sets it, everyone sees it
    // ════════════════════════════════════════════════════════════
    async function loadStatusBanner() {
      try {
        const snap = await getDoc(doc(db, 'config', 'status'));
        if (!snap.exists()) return;
        const { message, type, active } = snap.data();
        if (active && message) paintBanner(message, type);
      } catch(e) { /* no config doc yet — that's fine */ }
    }

    function paintBanner(message, type='info') {
      const banner = $('statusBanner');
      if (!banner) return;
      const icons = { info:'ℹ️', warning:'⚠️', success:'✅', error:'🚨' };
      banner.className = `status-banner status-${type}`;
      banner.innerHTML = `
        <span class="sb-icon">${icons[type]||'ℹ️'}</span>
        <span class="sb-msg">${esc(message)}</span>
        ${isAdmin ? `<button class="sb-edit" id="editStatusBtn">Edit</button>` : ''}`;
      banner.classList.remove('hidden');
      if (isAdmin) $('editStatusBtn').onclick = openStatusEditor;
    }

    function openStatusEditor() {
      const old = document.querySelector('.status-editor-modal');
      if (old) old.remove();

      const modal = document.createElement('div');
      modal.className = 'modal-overlay status-editor-modal';
      modal.innerHTML = `
        <div class="modal" style="max-width:480px">
          <button class="modal-close" id="closeStatusModal">✕</button>
          <h3 style="font-family:var(--font-head);margin-bottom:1.25rem">📢 Site Status Banner</h3>
          <p style="color:var(--muted);font-size:.875rem;margin-bottom:1rem">
            This message is pinned at the top of the app for every user. Use it for maintenance notices, announcements, or important alerts.
          </p>
          <textarea id="statusMsg" class="input" style="height:80px;resize:vertical;border-radius:10px"
            placeholder="e.g. Scheduled maintenance tonight at 10 PM UTC…"></textarea>
          <div style="margin:.9rem 0">
            <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.08em;font-weight:600">Banner type</label>
            <div class="stype-row">
              <button class="stype-btn active" data-t="info">ℹ️ Info</button>
              <button class="stype-btn" data-t="warning">⚠️ Warning</button>
              <button class="stype-btn" data-t="success">✅ Good News</button>
              <button class="stype-btn" data-t="error">🚨 Alert</button>
            </div>
          </div>
          <div style="display:flex;gap:.75rem;margin-top:1.25rem">
            <button class="btn btn-primary" id="saveStatusBtn" style="flex:1">Save &amp; Publish</button>
            <button class="btn btn-danger"  id="clearStatusBtn">Clear Banner</button>
          </div>
        </div>`;
      document.body.appendChild(modal);

      let selType = 'info';
      modal.querySelectorAll('.stype-btn').forEach(b => {
        b.onclick = () => {
          modal.querySelectorAll('.stype-btn').forEach(x=>x.classList.remove('active'));
          b.classList.add('active'); selType = b.dataset.t;
        };
      });
      modal.querySelector('#closeStatusModal').onclick = () => modal.remove();
      modal.onclick = e => { if(e.target===modal) modal.remove(); };

      modal.querySelector('#saveStatusBtn').onclick = async () => {
        const msg = modal.querySelector('#statusMsg').value.trim();
        if (!msg) return;
        await setDoc(doc(db,'config','status'), {
          message:msg, type:selType, active:true,
          updatedAt:serverTimestamp(), updatedBy:currentUser.uid
        });
        paintBanner(msg, selType);
        modal.remove();
      };

      modal.querySelector('#clearStatusBtn').onclick = async () => {
        await setDoc(doc(db,'config','status'), { active:false, message:'', type:'info' });
        const b = $('statusBanner');
        if (b) b.classList.add('hidden');
        modal.remove();
      };
    }

    // ════════════════════════════════════════════════════════════
    //  VIEWS
    // ════════════════════════════════════════════════════════════
    function switchView(view) {
      if (unsubFeed) { unsubFeed(); unsubFeed = null; }
      const titles = {feed:'Home',explore:'Explore',profile:'Profile',coc:'Community Rules',admin:'Admin Panel'};
      $('viewTitle').textContent = titles[view] || 'Home';
      if (view==='feed')    loadFeed();
      if (view==='explore') loadExplore();
      if (view==='profile') loadProfile(currentUser.uid);
      if (view==='coc')     loadCoCView();
      if (view==='admin' && isAdmin) loadAdminPanel();
    }

    function loadFeed() {
      const c = $('viewContainer');
      c.innerHTML = '<div class="loading-pulse">Loading chirps…</div>';
      const q = query(collection(db,'chirps'), orderBy('createdAt','desc'), limit(50));
      unsubFeed = onSnapshot(q, snap => {
        c.innerHTML = '';
        if (snap.empty) { c.innerHTML='<p class="empty-state">No chirps yet. Be the first!</p>'; return; }
        snap.forEach(d => c.appendChild(chirpCard({id:d.id,...d.data()})));
      });
    }

    async function loadExplore() {
      const c = $('viewContainer');
      c.innerHTML = '<div class="loading-pulse">Finding people…</div>';
      const snap = await getDocs(query(collection(db,'users'), limit(20)));
      c.innerHTML = '<h3 class="section-label">People to follow</h3>';
      snap.forEach(d => { if(d.id!==currentUser.uid) c.appendChild(userCard({id:d.id,...d.data()})); });
    }

    async function loadProfile(uid) {
      const c = $('viewContainer');
      c.innerHTML = '<div class="loading-pulse">Loading profile…</div>';
      const snap = await getDoc(doc(db,'users',uid));
      if (!snap.exists()) { c.innerHTML='<p class="empty-state">User not found.</p>'; return; }
      const u = {id:uid,...snap.data()};
      const isMe = uid===currentUser.uid;
      const isFollowing = (u.followers||[]).includes(currentUser.uid);
      const uIsAdmin = uid===ADMIN_UID;

      c.innerHTML = `
        <div class="profile-header">
          <div class="profile-avatar" style="background:${u.avatar||avatarColor(uid)}">
            ${(u.displayName||'?')[0].toUpperCase()}
          </div>
          <div class="profile-info">
            <h2>${uIsAdmin?'👑 ':''}${u.displayName}</h2>
            <p class="user-handle">@${u.handle}${uIsAdmin?' · Admin':''}</p>
            <p class="profile-bio">${u.bio||''}</p>
            <div class="profile-stats">
              <span><strong>${(u.following||[]).length}</strong> Following</span>
              <span><strong>${(u.followers||[]).length}</strong> Followers</span>
            </div>
          </div>
          ${isMe
            ? `<button class="btn btn-outline" id="editProfileBtn">Edit Profile</button>`
            : `<button class="btn ${isFollowing?'btn-outline':'btn-primary'}" id="followBtn">${isFollowing?'Unfollow':'Follow'}</button>`
          }
        </div>
        <div class="section-label">Chirps</div>
        <div id="profileChirps"><div class="loading-pulse">Loading…</div></div>`;

      if (isMe) $('editProfileBtn').onclick = () => showEditProfile(u);
      else       $('followBtn').onclick      = () => toggleFollow(uid);

      const cs = await getDocs(query(collection(db,'chirps'),where('uid','==',uid),orderBy('createdAt','desc'),limit(20)));
      const pc = $('profileChirps');
      pc.innerHTML = '';
      cs.forEach(d => pc.appendChild(chirpCard({id:d.id,...d.data()})));
      if (cs.empty) pc.innerHTML='<p class="empty-state">No chirps yet.</p>';
    }

    function loadCoCView() {
      $('viewContainer').innerHTML = `<div class="coc-inline">${cocRules()}</div>`;
    }

    // ════════════════════════════════════════════════════════════
    //  ADMIN PANEL
    // ════════════════════════════════════════════════════════════
    async function loadAdminPanel() {
      if (!isAdmin) return;
      const c = $('viewContainer');
      c.innerHTML = '<div class="loading-pulse">Loading admin panel…</div>';

      const [chirpsSnap, usersSnap] = await Promise.all([
        getDocs(query(collection(db,'chirps'), orderBy('createdAt','desc'), limit(100))),
        getDocs(collection(db,'users'))
      ]);

      c.innerHTML = `
        <div class="admin-panel">
          <div class="admin-stats">
            <div class="stat-card"><div class="stat-num">${usersSnap.size}</div><div class="stat-lbl">Users</div></div>
            <div class="stat-card"><div class="stat-num">${chirpsSnap.size}</div><div class="stat-lbl">Chirps</div></div>
            <div class="stat-card stat-click" id="adminStatusCard">
              <div class="stat-num">📢</div><div class="stat-lbl">Site Status</div>
            </div>
          </div>

          <div class="admin-section">
            <h3>👥 Manage Users</h3>
            <div id="adminUsers"></div>
          </div>

          <div class="admin-section">
            <h3>🐦 Manage Chirps</h3>
            <div id="adminChirps"></div>
          </div>
        </div>`;

      $('adminStatusCard').onclick = openStatusEditor;

      // Users list
      const ul = $('adminUsers');
      usersSnap.forEach(d => {
        const u = {id:d.id,...d.data()};
        const me = u.id===ADMIN_UID;
        const row = mk('div','admin-row');
        row.innerHTML = `
          <div class="avatar-sm" style="background:${u.avatar||avatarColor(u.id)}">${(u.displayName||'?')[0].toUpperCase()}</div>
          <div style="flex:1;min-width:0;overflow:hidden">
            <div><span class="chirp-name">${me?'👑 ':''}${u.displayName}</span> <span class="chirp-handle">@${u.handle}</span></div>
            <div style="font-size:.78rem;color:var(--muted)">${u.email||''}</div>
          </div>
          ${me
            ? '<span class="admin-you">You</span>'
            : `<button class="btn btn-danger btn-sm" data-uid="${u.id}" data-name="${esc(u.displayName)}">Ban</button>`}`;
        const banBtn = row.querySelector('[data-uid]');
        if (banBtn) banBtn.onclick = () => banUser(banBtn.dataset.uid, banBtn.dataset.name);
        ul.appendChild(row);
      });

      // Chirps list
      const cl = $('adminChirps');
      chirpsSnap.forEach(d => {
        const ch = {id:d.id,...d.data()};
        const row = mk('div','admin-row');
        row.innerHTML = `
          <div class="avatar-sm" style="background:${ch.avatar||'#7b61ff'}">${(ch.displayName||'?')[0].toUpperCase()}</div>
          <div style="flex:1;min-width:0;overflow:hidden">
            <div><span class="chirp-name">${ch.displayName}</span> <span class="chirp-handle">@${ch.handle}</span></div>
            <p style="font-size:.875rem;margin-top:.2rem;word-break:break-word;color:var(--text)">${esc(ch.text)}</p>
          </div>
          <button class="btn btn-danger btn-sm" data-id="${ch.id}">Delete</button>`;
        const delBtn = row.querySelector('[data-id]');
        delBtn.onclick = () => { deleteDoc(doc(db,'chirps',ch.id)); row.remove(); };
        cl.appendChild(row);
      });
    }

    async function banUser(uid, name) {
      if (!confirm(`Ban "${name}"? This deletes their profile and all chirps.`)) return;
      const cs = await getDocs(query(collection(db,'chirps'),where('uid','==',uid)));
      await Promise.all(cs.docs.map(d=>deleteDoc(doc(db,'chirps',d.id))));
      await deleteDoc(doc(db,'users',uid));
      loadAdminPanel();
    }

    // ════════════════════════════════════════════════════════════
    //  EDIT PROFILE
    // ════════════════════════════════════════════════════════════
    function showEditProfile(u) {
      const modal = mk('div','modal-overlay');
      modal.innerHTML = `
        <div class="modal">
          <button class="modal-close" id="closeEdit">✕</button>
          <h3 style="font-family:var(--font-head);margin-bottom:1rem">Edit Profile</h3>
          <input id="editName" class="input" value="${esc(u.displayName)}" placeholder="Name" />
          <textarea id="editBio" class="input" style="height:80px;resize:vertical;margin-top:.5rem;border-radius:10px" placeholder="Bio (optional)">${esc(u.bio||'')}</textarea>
          <button class="btn btn-primary" style="margin-top:.75rem" id="saveEdit">Save Changes</button>
        </div>`;
      document.body.appendChild(modal);
      modal.querySelector('#closeEdit').onclick = () => modal.remove();
      modal.onclick = e => { if(e.target===modal) modal.remove(); };
      modal.querySelector('#saveEdit').onclick = async () => {
        const name = modal.querySelector('#editName').value.trim();
        const bio  = modal.querySelector('#editBio').value.trim();
        if (!name) return;
        await updateDoc(doc(db,'users',currentUser.uid),{displayName:name,bio});
        currentUser.chirpName = name; currentUser.bio = bio;
        modal.remove();
        loadProfile(currentUser.uid);
        const nm = $('sidebarUser')?.querySelector('.user-name');
        if (nm) nm.innerHTML = `${isAdmin?'<span class="admin-crown">👑</span>':''}${name}`;
      };
    }

    // ════════════════════════════════════════════════════════════
    //  FOLLOW
    // ════════════════════════════════════════════════════════════
    async function toggleFollow(uid) {
      const myRef = doc(db,'users',currentUser.uid), theirRef = doc(db,'users',uid);
      const snap = await getDoc(theirRef);
      const following = (snap.data().followers||[]).includes(currentUser.uid);
      if (following) {
        await updateDoc(theirRef,{followers:arrayRemove(currentUser.uid)});
        await updateDoc(myRef,  {following:arrayRemove(uid)});
      } else {
        await updateDoc(theirRef,{followers:arrayUnion(currentUser.uid)});
        await updateDoc(myRef,  {following:arrayUnion(uid)});
      }
      loadProfile(uid);
    }

    // ════════════════════════════════════════════════════════════
    //  POST CHIRP
    // ════════════════════════════════════════════════════════════
    async function postChirp() {
      const text = $('chirpText').value.trim();
      if (!text) return;
      $('postBtn').textContent='Chirping…'; $('postBtn').disabled=true;
      try {
        await addDoc(collection(db,'chirps'),{
          text, uid:currentUser.uid,
          handle:currentUser.chirpHandle,
          displayName:currentUser.chirpName||currentUser.displayName,
          avatar:currentUser.avatar||avatarColor(currentUser.uid),
          isAdmin, likes:[], rechirps:[],
          createdAt:serverTimestamp()
        });
        $('chirpText').value=''; $('charCount').textContent='280'; hide('composeModal');
      } catch(e) { alert('Failed to post: '+e.message); }
      $('postBtn').textContent='Chirp'; $('postBtn').disabled=false;
    }

    // ════════════════════════════════════════════════════════════
    //  CHIRP CARD
    // ════════════════════════════════════════════════════════════
    function chirpCard(data) {
      const el        = mk('div','chirp-card');
      const liked     = (data.likes||[]).includes(currentUser.uid);
      const rechirped = (data.rechirps||[]).includes(currentUser.uid);
      const time      = data.createdAt?.toDate ? ago(data.createdAt.toDate()) : 'just now';
      const ini       = (data.displayName||'?')[0].toUpperCase();
      const canDel    = data.uid===currentUser.uid || isAdmin;
      const chirpByAdmin = data.uid===ADMIN_UID;

      el.innerHTML = `
        <div class="avatar-sm" style="background:${data.avatar||'#7b61ff'};flex-shrink:0">${ini}</div>
        <div class="chirp-body">
          <div class="chirp-meta">
            <span class="chirp-name" data-uid="${data.uid}">${chirpByAdmin?'👑 ':''}${esc(data.displayName)}</span>
            <span class="chirp-handle">@${data.handle}</span>
            ${chirpByAdmin?'<span class="admin-tag">Admin</span>':''}
            <span class="chirp-time">${time}</span>
            ${canDel?`<button class="del-btn" data-id="${data.id}" title="Delete">✕</button>`:''}
          </div>
          <p class="chirp-text">${esc(data.text)}</p>
          <div class="chirp-actions">
            <button class="action-btn like-btn ${liked?'liked':''}" data-id="${data.id}">
              ${liked?'♥':'♡'} <span>${(data.likes||[]).length}</span>
            </button>
            <button class="action-btn rechirp-btn ${rechirped?'rechirped':''}" data-id="${data.id}">
              ⟳ <span>${(data.rechirps||[]).length}</span>
            </button>
          </div>
        </div>`;

      el.querySelector('.like-btn').onclick     = () => toggleLike(data.id, data.likes||[]);
      el.querySelector('.rechirp-btn').onclick  = () => toggleRechirp(data.id, data.rechirps||[]);
      el.querySelector('.chirp-name').onclick   = () => gotoProfile(data.uid);
      if (canDel) el.querySelector('.del-btn').onclick = () => delChirp(data.id);
      return el;
    }

    // ════════════════════════════════════════════════════════════
    //  USER CARD
    // ════════════════════════════════════════════════════════════
    function userCard(u) {
      const el = mk('div','user-card');
      const isF = (u.followers||[]).includes(currentUser.uid);
      const uA  = u.id===ADMIN_UID;
      el.innerHTML = `
        <div class="avatar-md" style="background:${u.avatar||avatarColor(u.id)}">${(u.displayName||'?')[0].toUpperCase()}</div>
        <div class="user-card-info">
          <div class="chirp-name">${uA?'👑 ':''}${u.displayName}</div>
          <div class="chirp-handle">@${u.handle}${uA?' · Admin':''}</div>
          ${u.bio?`<div class="profile-bio" style="font-size:.85rem">${u.bio}</div>`:''}
        </div>
        <button class="btn ${isF?'btn-outline':'btn-primary'} btn-sm">${isF?'Unfollow':'Follow'}</button>`;
      el.querySelector('button').onclick       = () => toggleFollow(u.id);
      el.querySelector('.chirp-name').onclick  = () => gotoProfile(u.id);
      return el;
    }

    function gotoProfile(uid) {
      if (unsubFeed) { unsubFeed(); unsubFeed=null; }
      document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
      document.querySelector('[data-view="profile"]').classList.add('active');
      $('viewTitle').textContent='Profile';
      loadProfile(uid);
    }

    // ════════════════════════════════════════════════════════════
    //  ACTIONS
    // ════════════════════════════════════════════════════════════
    async function toggleLike(id,likes) {
      const r=doc(db,'chirps',id);
      if(likes.includes(currentUser.uid)) await updateDoc(r,{likes:arrayRemove(currentUser.uid)});
      else await updateDoc(r,{likes:arrayUnion(currentUser.uid)});
    }
    async function toggleRechirp(id,rechirps) {
      const r=doc(db,'chirps',id);
      if(rechirps.includes(currentUser.uid)) await updateDoc(r,{rechirps:arrayRemove(currentUser.uid)});
      else await updateDoc(r,{rechirps:arrayUnion(currentUser.uid)});
    }
    async function delChirp(id) {
      if(!confirm('Delete this chirp?')) return;
      await deleteDoc(doc(db,'chirps',id));
    }

    // ════════════════════════════════════════════════════════════
    //  TRENDING
    // ════════════════════════════════════════════════════════════
    async function loadTrending() {
      const snap = await getDocs(query(collection(db,'chirps'),orderBy('createdAt','desc'),limit(100)));
      const wc={}, stop=new Set(['the','a','an','and','or','is','in','on','at','to','it','of','for','with','that','this','was','are','i','you','he','she','we','they','be','have','do','not','my','your','its','as','but','if','from','so','what','how','get','can','will','just','about','up','out','who']);
      snap.forEach(d=>{
        (d.data().text||'').split(/\s+/).forEach(w=>{
          const c=w.toLowerCase().replace(/[^a-z#]/g,'');
          if(c.length>3&&!stop.has(c)) wc[c]=(wc[c]||0)+1;
        });
      });
      const top=Object.entries(wc).sort((a,b)=>b[1]-a[1]).slice(0,6);
      const tl=$('trendingList');
      if (!tl) return;
      tl.innerHTML=top.length
        ? top.map(([w,c])=>`<div class="trend-item"><span class="trend-word">${w}</span><span class="trend-count">${c} chirps</span></div>`).join('')
        : '<p style="padding:.75rem;color:var(--muted);font-size:.875rem">Post some chirps!</p>';
    }

    // ════════════════════════════════════════════════════════════
    //  SEARCH
    // ════════════════════════════════════════════════════════════
    async function handleSearch() {
      const q=$('searchInput').value.trim().toLowerCase();
      if(!q){loadTrending();return;}
      const snap=await getDocs(collection(db,'chirps'));
      const results=[];
      snap.forEach(d=>{if((d.data().text||'').toLowerCase().includes(q))results.push({id:d.id,...d.data()});});
      const c=$('viewContainer');
      c.innerHTML=`<h3 class="section-label">Results for "${esc(q)}"</h3>`;
      if(!results.length){c.innerHTML+='<p class="empty-state">No chirps found.</p>';return;}
      results.slice(0,20).forEach(r=>c.appendChild(chirpCard(r)));
      $('viewTitle').textContent='Search';
    }

    // ════════════════════════════════════════════════════════════
    //  UTILS
    // ════════════════════════════════════════════════════════════
    function ago(d){const s=Math.floor((Date.now()-d)/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';return Math.floor(s/86400)+'d';}
    function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function mk(tag,cls){const el=document.createElement(tag);if(cls)el.className=cls;return el;}
    function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
  </script>

    .avatar-sm,.avatar-md,.profile-avatar{
      display:flex;align-items:center;justify-content:center;
      border-radius:50%;font-weight:700;color:#fff;flex-shrink:0;
    }
    .avatar-sm{width:42px;height:42px;font-size:1rem}
    .avatar-md{width:52px;height:52px;font-size:1.2rem}
    .profile-avatar{width:80px;height:80px;font-size:2rem}

    /* ─── PROFILE ─── */
    .profile-header{display:flex;align-items:flex-start;gap:1rem;padding:1.5rem;border-bottom:1px solid var(--border)}
    .profile-info{flex:1}
    .profile-info h2{font-size:1.4rem;font-weight:700}
    .profile-bio{color:var(--muted);font-size:.9rem;margin:.5rem 0}
    .profile-stats{display:flex;gap:1.5rem;margin-top:.75rem;font-size:.9rem}
    .profile-stats strong{color:var(--text)}
    .section-label{
      padding:1rem 1.5rem .5rem;color:var(--muted);font-size:.85rem;font-weight:600;
      letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border);
    }

    /* ─── USER CARD ─── */
    .user-card{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid var(--border);transition:background .15s}
    .user-card:hover{background:var(--surface)}
    .user-card-info{flex:1}

    /* ─── ADMIN PANEL ─── */
    .admin-panel{padding:1.5rem;display:flex;flex-direction:column;gap:2rem}
    .admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
    .stat-card{
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:1.25rem;text-align:center;transition:border-color .15s;
    }
    .stat-click{cursor:pointer}
    .stat-click:hover{border-color:var(--primary)}
    .stat-num{font-size:2rem;font-weight:800;color:var(--primary);font-family:var(--font-head)}
    .stat-lbl{font-size:.8rem;color:var(--muted);margin-top:.25rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
    .admin-section h3{font-size:1.1rem;font-weight:700;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
    .admin-row{
      display:flex;align-items:center;gap:.75rem;padding:.85rem;border-radius:10px;
      margin-bottom:.5rem;background:var(--surface);border:1px solid var(--border);
    }
    .admin-you{
      background:rgba(245,166,35,.15);color:var(--primary);
      font-size:.75rem;font-weight:700;padding:.25rem .6rem;border-radius:20px;flex-shrink:0;
    }

    /* ─── RIGHT PANEL ─── */
    .right-panel{padding:1.5rem 1rem}
    .search-box{
      display:flex;align-items:center;gap:.75rem;background:var(--surface);
      border:1px solid var(--border);border-radius:50px;padding:.65rem 1.1rem;
      margin-bottom:1.25rem;transition:border-color .15s;
    }
    .search-box:focus-within{border-color:var(--primary)}
    .search-box svg{width:17px;height:17px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
    .search-box input{background:none;border:none;outline:none;color:var(--text);font-size:.9rem;width:100%;font-family:var(--font-body)}
    .trending-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
    .trending-card h3{font-family:var(--font-head);font-size:1.2rem;margin-bottom:1rem}
    .trend-item{display:flex;justify-content:space-between;align-items:center;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.9rem}
    .trend-item:last-child{border-bottom:none}
    .trend-word{font-weight:600;color:var(--primary)}
    .trend-count{font-size:.8rem;color:var(--muted)}

    /* ─── MODAL ─── */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.6);
      backdrop-filter:blur(4px);display:flex;align-items:flex-start;
      justify-content:center;padding:4rem 1rem;z-index:100;
    }
    .modal{
      background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      padding:1.5rem;width:100%;max-width:560px;position:relative;animation:slideDown .2s ease;
    }
    @keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
    .modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;transition:color .15s}
    .modal-close:hover{color:var(--text)}
    .compose-area{display:flex;gap:1rem}
    .compose-right{flex:1}
    textarea{width:100%;background:none;border:none;outline:none;color:var(--text);font-family:var(--font-body);font-size:1.1rem;resize:none;min-height:120px;line-height:1.5}
    textarea::placeholder{color:var(--muted)}
    .compose-footer{display:flex;align-items:center;justify-content:flex-end;gap:1rem;padding-top:.75rem;border-top:1px solid var(--border)}
    .char-count{font-size:.85rem;color:var(--muted)}

    /* ─── BUTTONS & INPUTS ─── */
    .input{
      width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;
      padding:.75rem 1rem;color:var(--text);font-family:var(--font-body);font-size:.95rem;
      outline:none;transition:border-color .15s;display:block;
    }
    .input:focus{border-color:var(--primary)}
    .input::placeholder{color:var(--muted)}
    .btn{
      padding:.75rem 1.5rem;border:none;border-radius:50px;cursor:pointer;
      font-family:var(--font-body);font-size:.95rem;font-weight:600;
      transition:background .15s,opacity .15s,transform .1s;
    }
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--primary);color:#000}
    .btn-primary:hover{background:var(--primary-h)}
    .btn-outline{background:none;border:2px solid var(--border);color:var(--text)}
    .btn-outline:hover{border-color:var(--text)}
    .btn-danger{background:rgba(255,107,107,.15);color:var(--like);border:1px solid rgba(255,107,107,.3)}
    .btn-danger:hover{background:rgba(255,107,107,.25)}
    .btn-sm{padding:.45rem 1rem;font-size:.85rem}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    .hidden{display:none!important}
    .loading-pulse{padding:2rem;text-align:center;color:var(--muted);animation:pulse 1.5s ease infinite}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    .empty-state{padding:2.5rem;text-align:center;color:var(--muted)}

    /* ─── RESPONSIVE ─── */
    @media(max-width:900px){
      .layout{grid-template-columns:60px 1fr}
      .right-panel{display:none}
      .sidebar-logo span,.nav-item span,.chirp-btn,.sidebar-user .user-name,.sidebar-user .user-handle{display:none}
      .nav-item{padding:.75rem;justify-content:center}
      .sidebar-logo{padding:.5rem;text-align:center}
      .chirp-btn{padding:.75rem;font-size:1.2rem}
      .sidebar-user{padding:.5rem;justify-content:center}
      .signout-btn{margin-left:0}
      .admin-stats{grid-template-columns:1fr 1fr}
    }
    @media(max-width:600px){
      .layout{grid-template-columns:1fr}
      .sidebar{
        position:fixed;bottom:0;left:0;right:0;top:auto;height:auto;
        flex-direction:row;justify-content:space-around;
        border-right:none;border-top:1px solid var(--border);
        padding:.5rem;background:var(--bg);z-index:50;
      }
      .sidebar-logo,.chirp-btn,.sidebar-user{display:none}
      .sidebar-nav{flex-direction:row;gap:0}
    }
  </style>
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6b7592;font-family:sans-serif">
      Loading Chirp…
    </div>
  </div>
</body>
</html>
