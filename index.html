<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chirp 🐦</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">
<script src="https://cdn.jsdelivr.net"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0a0f1e; --bg2:#111827; --border:#1e2d45;
    --accent:#1d9bf0; --text1:#e7ecf0; --text2:#8899aa;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text1); overflow-x: hidden; }

  /* LOADING */
  #loading-overlay { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; }
  
  /* AUTH */
  #auth-screen { position:fixed; inset:0; background:var(--bg); display:none; align-items:center; justify-content:center; z-index:9000; }
  .auth-card { background:var(--bg2); border:1px solid var(--border); padding:40px; border-radius:16px; width:100%; max-width:400px; display:flex; flex-direction:column; gap:15px; }
  .auth-input { background:#1a2236; border:1px solid var(--border); padding:12px; border-radius:8px; color:#fff; outline:none; }
  .auth-btn { background:var(--accent); border:none; color:#fff; padding:12px; border-radius:99px; font-weight:700; cursor:pointer; }

  /* APP LAYOUT */
  .app { display:none; height:100vh; }
  .sidebar { width:240px; border-right:1px solid var(--border); padding:20px; display:flex; flex-direction:column; gap:20px; }
  .feed { flex:1; overflow-y:auto; border-right:1px solid var(--border); }
  .header { position:sticky; top:0; background:rgba(10,15,30,0.8); backdrop-filter:blur(10px); padding:15px; border-bottom:1px solid var(--border); font-weight:800; font-size:20px; }
  
  /* COMPOSER */
  .composer { padding:15px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:10px; }
  textarea { background:transparent; border:none; color:white; font-size:18px; resize:none; outline:none; font-family:inherit; }
  
  /* POSTS */
  .post { padding:15px; border-bottom:1px solid var(--border); transition: 0.2s; }
  .post:hover { background: #111827; }
  .post-user { font-weight:800; font-size:14px; margin-bottom:4px; }
  .post-content { color:var(--text1); line-height:1.4; }
  .post-date { font-size:12px; color:var(--text2); margin-top:8px; }
</style>
</head>
<body>

  <div id="loading-overlay">🐦 Loading...</div>

  <!-- Auth Screen -->
  <div id="auth-screen">
    <div class="auth-card">
      <h1 style="text-align:center">Chirp 🐦</h1>
      <input type="email" id="email" class="auth-input" placeholder="Email">
      <input type="password" id="password" class="auth-input" placeholder="Password">
      <button class="auth-btn" onclick="handleAuth('login')">Log In</button>
      <button class="auth-btn" style="background:transparent; border:1px solid var(--border)" onclick="handleAuth('signup')">Sign Up</button>
    </div>
  </div>

  <!-- Main App -->
  <div class="app" id="main-app">
    <div class="sidebar">
      <h2>🐦 Chirp</h2>
      <button class="auth-btn" onclick="signOut()">Log Out</button>
    </div>
    <div class="feed">
      <div class="header">Home</div>
      <div class="composer">
        <textarea id="post-input" placeholder="What's happening?" rows="3"></textarea>
        <button class="auth-btn" onclick="postChirp()" style="width:100px; align-self:flex-end">Chirp</button>
      </div>
      <div id="posts-container"></div>
    </div>
  </div>

<script>
  // 1. CONFIGURATION
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';
  const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 2. AUTH LOGIC
  async function handleAuth(type) {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    const { error } = type === 'login' 
      ? await supabase.auth.signInWithPassword({ email, password })
      : await supabase.auth.signUp({ email, password });

    if (error) alert(error.message);
    else if (type === 'signup') alert("Check your email for confirmation!");
  }

  async function signOut() {
    await supabase.auth.signOut();
  }

  // 3. OBSERVE AUTH STATE
  supabase.auth.onAuthStateChange((event, session) => {
    document.getElementById('loading-overlay').style.display = 'none';
    if (session) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-app').style.display = 'flex';
      fetchPosts();
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('main-app').style.display = 'none';
    }
  });

  // 4. DATABASE LOGIC
  async function postChirp() {
    const content = document.getElementById('post-input').value;
    const user = (await supabase.auth.getUser()).data.user;

    if (!content) return;

    const { error } = await supabase
      .from('posts')
      .insert([{ content, user_email: user.email }]);

    if (error) alert(error.message);
    else {
      document.getElementById('post-input').value = '';
      fetchPosts();
    }
  }

  async function fetchPosts() {
    const { data: posts, error } = await supabase
      .from('posts')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) return console.error(error);

    const container = document.getElementById('posts-container');
    container.innerHTML = posts.map(post => `
      <div class="post">
        <div class="post-user">${post.user_email}</div>
        <div class="post-content">${post.content}</div>
        <div class="post-date">${new Date(post.created_at).toLocaleString()}</div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
