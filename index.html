<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chirp 🐦</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<!-- Alternative CDN that is less likely to be blocked -->
<script src="https://cdnjs.cloudflare.com" crossorigin="anonymous"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0a0f1e; --bg2:#111827; --border:#1e2d45; --accent:#1d9bf0; --text1:#e7ecf0; --text2:#8899aa; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text1); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

  #loading-overlay { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
  .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #auth-screen { background:var(--bg2); border:1px solid var(--border); padding:40px; border-radius:16px; width:100%; max-width:400px; display:none; flex-direction:column; gap:15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .auth-input { background:#1a2236; border:1px solid var(--border); padding:12px; border-radius:8px; color:#fff; outline:none; width: 100%; }
  .auth-btn { background:var(--accent); border:none; color:#fff; padding:12px; border-radius:99px; font-weight:700; cursor:pointer; width: 100%; transition: opacity 0.2s; }
  .auth-btn:hover { opacity: 0.8; }

  .app { display:none; height:100vh; width: 100%; position: absolute; inset: 0; flex-direction: row; }
  .sidebar { width:240px; border-right:1px solid var(--border); padding:20px; display:flex; flex-direction:column; gap:20px; }
  .feed { flex:1; overflow-y:auto; }
  .header { padding:15px; border-bottom:1px solid var(--border); font-weight:800; font-size:20px; background: rgba(10,15,30,0.8); backdrop-filter: blur(10px); sticky: top; }
</style>
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top:10px; font-weight: 600;">Verifying Connection...</p>
  </div>

  <div id="auth-screen">
    <h1 style="text-align:center; margin-bottom: 10px;">Chirp 🐦</h1>
    <input type="email" id="email" class="auth-input" placeholder="Email">
    <input type="password" id="password" class="auth-input" placeholder="Password">
    <button class="auth-btn" onclick="handleAuth('login')">Log In</button>
    <button class="auth-btn" style="background:transparent; border:1px solid var(--border)" onclick="handleAuth('signup')">Sign Up</button>
  </div>

  <div class="app" id="main-app">
    <div class="sidebar"><h2>🐦 Chirp</h2><button class="auth-btn" style="background:#f4212e" onclick="signOut()">Log Out</button></div>
    <div class="feed"><div class="header">Home</div><div id="posts-container" style="padding: 20px; text-align: center; color: var(--text2);">No posts yet.</div></div>
  </div>

<script>
  const SUPABASE_URL = 'https://qmowaafvelxzidyvtxqm.supabase.co'; 
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtb3dhYWZ2ZWx4emlkeXZ0eHFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NzUzOTUsImV4cCI6MjA5MDQ1MTM5NX0.FCUMc0MrfMpTfKQ8iHxcneyc6u1TdeJIXKXvJ2BXqoM'; 

  let client;

  // Initialize only when DOM and Lib are ready
  window.addEventListener('DOMContentLoaded', () => {
    if (!window.supabase) {
      document.getElementById('loading-overlay').innerHTML = `
        <div style="text-align:center; padding: 20px;">
          <h2 style="color:#f4212e">Connection Blocked</h2>
          <p style="margin-top:10px; color:#8899aa">Your network or browser is blocking the database script.<br><b>Try turning off AdBlock or using a different WiFi.</b></p>
        </div>`;
      return;
    }

    client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Initial session check
    client.auth.getSession().then(({ data: { session } }) => {
      document.getElementById('loading-overlay').style.display = 'none';
      updateLayout(session);
    });

    // Listen for auth changes
    client.auth.onAuthStateChange((_event, session) => {
      updateLayout(session);
    });
  });

  function updateLayout(session) {
    const authUI = document.getElementById('auth-screen');
    const appUI = document.getElementById('main-app');
    
    if (session) {
      authUI.style.display = 'none';
      appUI.style.display = 'flex';
    } else {
      authUI.style.display = 'flex';
      appUI.style.display = 'none';
    }
  }

  async function handleAuth(type) {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if(!email || !password) return alert("Enter credentials");

    const { error } = type === 'login' 
      ? await client.auth.signInWithPassword({ email, password })
      : await client.auth.signUp({ email, password });
    
    if (error) alert(error.message);
    else if (type === 'signup') alert("Check email to verify your account!");
  }

  async function signOut() { await client.auth.signOut(); }
</script>
</body>
</html>
